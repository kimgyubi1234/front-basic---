<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .box {
                margin: 20px;
                /* "블록"의 마진 중첩은 위아래로 생기며 좌우는 중첩이 없음 */
                box-sizing: border-box;
                /* 보더(테두리)까지의 넓이를 컨텐츠가 기존으로 정해둔 200으로 정해두겠다. */
                border: 10px solid #222;
                /* 너비랑 높이가 컨텐츠 영역의 100% */
                padding: 50px;
                /* 컨텐츠와 테두리 사이. 안쪽여백 */
                /* 패딩과 보더(테두리)는 별개의 영역 */
                width: 200px;
                height: 200px;
                background-color: #dbdbdb;
            }
            .box2 {
                width: 100%;
                /* 여기서 %는 부모를 기준으로 적용하기에 부모 없이는 사용 금지 */
                height: 100%;
                background-color: yellow;
            }
            .ibox {
                display: inline-block;
                margin: 20px;
                /* "인라인"의 마진은 좌우만 적용된다. 이유는 택스트라서 */
                border: 10px solid #dbdbdb;
                padding: 20px;
                width: 100px;
                height: 100px;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <div class="box2"></div>
        </div>
        <div class="box">
            <div class="box2"></div>
        </div>
        <div>
            <span class="ibox">가나다라</span>
            <span class="ibox">마바사</span>
        </div>
    </body>
</html>
