<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .box {
                width: 100px;
                height: 100px;
                background-color: black;
            }
            .box2 {
                display: inline-block;
                width: 100px;
                height: 100px;
                background-color: gray;
            }
            .box3 {
                width: 300px;
                height: 200px;
                background-color: skyblue;
            }
            .box3-1 {
                width: 70%;
                height: 50%;
                /* .box3-1의 height: 50%;는 부모인 .box3의 height: 200px;의 50%라서 100px가 된다 */
                background-color: greenyellow;
            }
            .box3-2 {
                width: 100%;
                height: 50%;
                background-color: pink;
            }
        </style>
    </head>
    <body>
        <div class="box"></div>
        <label class="box2">가나다라</label>
        <label class="box2">가나다라</label>
        <!-- inline-block이라서 다음 줄에 생기는게 아닌 옆에 생긴다 -->
        <!-- 결국 width와 height가 적용되는건 block 요소다-->
        <div class="box3">
            <div class="box3-1">
                <div class="box3-2"></div>
            </div>
        </div>
    </body>
</html>
