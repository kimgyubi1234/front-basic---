<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
            display: flex;
            list-style-type: none;
            justify-content: flex-start;
            gap: 20px;
            /* gap => 간격 설정 */
            border: 1px solid #222;
            padding: 10px;
            width: 400px;
            height: 30px;
            text-decoration: underline;
        }
        li {
            border: 1px solid #222;
            width: 100ox;
            height: 20px;
            /* flex-shrink: 1; */
            /* shrink은 넘어섰을 때, 김밥 옆구리 터진 곳 사용, 기본값이 1 */
            /* flex-grow: 1; */
            flex: 1;
        }
        li.item {
            flex-grow: 2;
            /* 남는 것만 가져감, 기본값이 0 */
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li class=".item"></li>
            <li></li>
            <li class=".item"></li>
            <li></li>
            <li></li>
        </ul>
    </nav>
</body>
</html>
