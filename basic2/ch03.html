<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <!-- ctrl + shift + c => 브라우저에서 코드를 확인할 수 있음 -->
        <!-- label과 input은 인라인(글자) 요소라서 한 줄에 표시된다 -->
        <label for="">아이디</label>
        <input type="text">
        <!-- div는 블록 레벨 요소라 label과 input이 "한 블록(높이와 넓이)" 안에서 한줄을 차지하게 된다 -->
        <div>
            <label for="아이디"></label>
            <input type="text">
        </div>
    </body>
</html>
