<html lang="ko">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            table {
                border-collapse: collapse;
            }
            table, th, td {
                border: 1px solid #000000;
            }
        </style>
    </head>

        <table>

            <tbody>
                <tr>
                    <td>1교시</td>
                    <td>Java</td>
                    <td>HTML</td>
                    <td>MySQL</td>
                </tr>
                <tr>
                    <td>2교시</td>
                    <td>Java</td>

                    <td>MySQL</td>
                </tr>
                <tr>
                    <td>3교시</td>
                    <td>Spring</td>
                    <td>JS</td>
                    <td>프로젝트</td>
                </tr>
            </tbody>
        </table>

</html>
