<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-a {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            box-sizing: content-box;
        }
        .box-b {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box-a"></div>
    <div class="box-b"></div>
</body>
</html>

<!-- 
[질문]
- box-a의 실제 보이는 너비: 250px (계산 과정: width + padding + border)
- box-b의 실제 보이는 너비: 200px (계산 과정: border-box이 적용되어 컨텐츠 값인 200px이 된다)
- 어느 것이 더 직관적인가? 이유는?
 -->
