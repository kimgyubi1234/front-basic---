<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .tag {
                display: inline-block;
                /* inline은 box가 아닌 텍스트를 입력하는 곳이라서 width와 height가 있을 수 없다.
                inline에서 크기와 넓이는 조정하는건 텍스트의 길이와 크기로만 조정이 가능하기 때문이다 */
                width: 100px;
                height: 40px;
                background-color: #eee;
                text-align: center;
                margin: 5px;
            }
        </style>
    </head>
    <body>
        <span class="tag">Java</span>
        <span class="tag">Python</span>
        <span class="tag">CSS</span>
    </body>
</html>
