<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body{
                margin: 0;
                height: 100vh;
                background-image: url("./images/pppp.jpg");
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
            }
            .container {
                margin: 0 auto;
                box-sizing: border-box;
                width: 1200px;
                height: 600px;
                background: linear-gradient(90deg,rgba(0, 183, 255, 1) 0%, rgba(0, 255, 217, 1) 100%);
                overflow: hidden;
                /* overflow 콘텐츠가 지정한 박스 모델의 너비나 높이보다 커서 
                경계 밖으로 넘칠 때, 이를 어떻게 처리할지 결정하는 속성 */
                /* hidden, auto, visible, scroll를 사용한다 */
            }
            .profile-image{
                margin: 50px auto;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 50%;
                width: 100px;
                height: 100px;
                box-shadow: 0 0 10px 5px #00000044;
                background-image: url("./images/default_profile.jpg");
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- container는 컨텐츠를 감싸는 박스
             웹사이트의 전체 너비를 제한하거나, 콘텐츠를 중앙에 배치하기 위해 사용
             요소들을 그룹화하고, 배경색을 입히거나 여백(Padding/Margin)을 조절하는 기준점 -->
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
        </div>
    </body>
</html>
