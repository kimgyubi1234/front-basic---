<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 배열 + 객체
        // 배열 선언 초기화
        const arr = [];
        const arr2 = new Array();

        const studnet = [];
        const s1 = {
            name: "김준일",
            age: 33,
        };
        const s2 = {
            name: "김준이",
            age: 34,
        };
        studnet.push(s1);
        studnet.push(s2);

        const studnet2 = [
            {
                name: "김준일",
                age: 33,
            },
            {
                name: "김준이",
                age: 34,
            },

        ];
            console.log(studnet2);

        const studnet3 = [
            ...studnet2, //studnet2에 있던 요소들을 "카피"한다 => 스프레드 문법(객체 또는 배열의 요소들을 복제)
            {
                name: "김준일",
                age: 35,
            },
        ]
            console.log(studnet3);
        const studnet4 = [
            ...studnet2,
            {
                ...studnet3[2],
                address: "동래구",
            }
        ]
        console.log(studnet4);

        const nums = [10, 20, 30, 40];
        const nums2 = [...nums, 50]; 
        console.log(nums);
        console.log(nums2);

        const user = {
            username: "aaa",
            password: "1223",
        }
        const user2 = {
            ...user,
            name: "bbb",
        }
        console.log(user);
        console.log(user2);
    </script>
</body>
</html>
