<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="all" onchange="handleCheckOnChange(event)"></th>
                <th>번호</th>
                <th>이름</th>
            </tr>
        </thead>
    </table>

    <script>
        let tableRender= [];
        function requestStudentData() {
            let studentList = [
                {id: 1, naem: "김준일"},
                {id: 2, naem: "김준이"},
                {id: 3, naem: "김준삼"},
                {id: 4, naem: "김준사"},
            ];
            tableRowData = studentList.map(s => ({
                ...s,
                checked: false, // 원래 위 (let studentList = [...];)모양인데 checked까지 추가 되었다
            }));
        }

        function render() {
            const tbody = document.querySelector("tbody");
            tbody.innerHTML = tableRowData.map(s => `
                <tr>
                    <th><input type="checkbox" id="${s.id}" ${s.checked ? "checked" : ""} onchange="handleCheckOnChange(event)"></th>    
                    <th>${s.id}</th>
                    <th>${s.name}</th>    
                </tr>`).join("");
        }

        requestStudentData(); //호출
        render(); //호출

        function handleCheckOnChange(e) {
            if (e.target.id === "all") {
                console.log(e.target.checked);
                tableRowData = tableRowData.map(s => ({
                    ...s,
                    checked: e.target.checked,
                }));
                render();
                return;
            }

            tableRowData = tableRowData.map(s => {
                if (s.id === parseInt(e.target.id)) {
                    return {
                        ...s,
                        checked: e.target.checked,
                    }
                }
                return s;
            });

            const checkedRow = tableRowData.filter(s => s.checked);
            const allCheckBox = document.querySelector("#all");
            allCheckBox.checked = checkedRow.length === tableRowData.length;
            render();
        }
    </script>
</body>
</html>
