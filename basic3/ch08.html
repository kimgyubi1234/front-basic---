<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 0 auto;
            padding: 100px 0;
            width: 1200px;
            overflow: auto;
        }
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            padding: 20px;
        }
        .input-box {
            position: relative;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow : hidden;

            & > label{
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #444;
            }
            & > input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }

        .input-is-not-empty {
            & > label {
                font-size: 12px;
                top: 25%;
            }
            & > input {
                top: 30%;
                height: 80%;
            }
        }

        .register-button {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbddbb;
            border-radius: 4px;
            width: 100%;
            height: 40px;
            background-color: #006caf;
            color: #fafafa;
            cursor: pointer;

            &:hover {
                background-color: #005489;
    
            }
    
            &:active{
                background-color: #003e65;
            }
        }


        .option-items-top {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            width: 100%;
        }

        .search-input {
            box-sizing: border-box;
            padding: 0 10px;
            width: 300px;
        }

        .df-row {
            display: flex;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 8px 15px;
            background-color: #555555;
            color: #fafafa;
            cursor: pointer;

            &:hover {
                background-color: #444444;
    
            }
    
            &:active{
                background-color: #333333;
            }
        }

        .btn.edit {
            background-color: #ffaa00;
            &:hover {
                background-color: #e29700;
    
            }
    
            &:active{
                background-color: #be7f00;
            }
        }

        .btn.delete {
            background-color: #cb0000;
            &:hover {
                background-color: #b40000;
    
            }
    
            &:active{
                background-color: #910000;
            }
        }

        .user-table {
            box-sizing: border-box;
            border-collapse: collapse;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            width: 500px;
            overflow: hidden;

            & th, & td {
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
        <div class="card">
            <div class="input-box">
                <input type="text" id="un" name="username">
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" id="pw" name="password">
                <label for="pw">비밀번호</label>
            </div>
            <button class="register-button">사용자 정보 등록</button>
        </div>
        <div>
            <div class="card">
                <div class="option-items-top">
                    <div class="df-row">
                        <input type="text" class="search-input">
                        <button class="btn">검색</button>
                    </div>
                    <div class="df-row" id="modeButtonGroup">
                        
                    </div>
                </div>
            </div>
            <div class="card">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="all" onchange="handleCheckBoxOnChange(event);"></th>
                            <th>ID</th>
                            <th>사용자 이름</th>
                            <th>비밀번호</th>
                            <th>삭제</th>
                        </tr>
                    </thead>
                    <tbody>
    
                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <script>
        const tableControlMode = {
            NONE: "NONE",
            MODIFY: "MODIFY",
            DELETE: "DELETE",
        };

        let currentTableControlMode = tableControlMode.NONE;

        let userList = [];
        modeButtonGroupRender();
        tableRender();

        function deleteAllById() {
            userList = userList.filter(user => !user.checked);
        }
        
        function handleModeButtonOnClick(e) {
            const checkBoxReset = () => {
                userList = userList.map(user => ({
                    ...user,
                    checked: false,
                }));
            }

            switch (e.target.value) {
                case "edit":
                    currentTableControlMode = tableControlMode.MODIFY;
                    break;
                case "delete":
                    currentTableControlMode = tableControlMode.DELETE;
                    break;
                case "ok":
                    if (currentTableControlMode === tableControlMode.DELETE) {
                        deleteAllById();
                    }
                    if (currentTableControlMode === tableControlMode.MODIFY) {
                        
                    }
                    currentTableControlMode = tableControlMode.NONE;
                    checkBoxReset();
                    break;
                case "cancel":
                    currentTableControlMode = tableControlMode.NONE;
                    checkBoxReset();
                    break;
            }
            modeButtonGroupRender();
            tableRender();
        }

        function autoIncrement() {
            let currentId = 0;

            return function () {
                currentId++;
                return currentId;
            }
        }

        const getNewId = autoIncrement();

        const inputBoxs = document.querySelectorAll(".input-box");

        for (let inputBox of inputBoxs) {
            const inputElement = inputBox.querySelector("input");

            inputElement.onfocus = (event) => {
                inputBox.classList.add("input-is-not-empty");
            }

            inputElement.onblur = (event) => {
                if (!event.target.value.trim().length) {
                    inputElement.value = "";
                }
                if (!event.target.value) {
                    inputBox.classList.remove("input-is-not-empty");
                }
            }
        }

        const registerButton = document.querySelector(".register-button");

        registerButton.onclick = () => {  // registerButton는 객체이자 태그, onclick는 속성이다
            const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));
            let newUser = {
                id: getNewId(),
                checked: false,
            }

            Array.from(inputs).forEach(element => {
                const {name, value} = element;
                newUser = {
                    ...newUser,
                    [name]: value,
                }
            });

            userList = [
                ...userList,
                newUser,
            ];

            tableRender();
        }

        function handleDeleteOnClick(id) { // 삭제. id가 값이 같으면 지워냄
            userList = userList.filter(user => user.id !== id);
            tableRender();
        }

        function handleCheckBoxOnChange(e) {
            const checkboxEl = e.target;
            if (checkboxEl.id === "all") {
                userList = userList.map(user => ({
                    ...user,
                    checked: checkboxEl.checked,
                }));
            } else if (currentTableControlMode === tableControlMode.DELETE) {
                userList = userList.map(user => {
                    if (user.id === parseInt(checkboxEl.id)) {
                        return {
                            ...user,
                            checked: checkboxEl.checked,
                        }
                    }
                    return user;
                });
            } else if (currentTableControlMode === tableControlMode.MODIFY) {
                userList = userList.map(user => {
                    if (user.id === parseInt(checkboxEl.id)) {
                        return {
                            ...user,
                            checked: checkboxEl.checked,
                        }
                    }
                    return {
                        ...user,
                        checked: false,
                    };
                });
            }
            tableRender();
        }

        function modeButtonGroupRender() {
            const modeButtonGroup = document.querySelector("#modeButtonGroup");
            if (currentTableControlMode === tableControlMode.NONE) {
                modeButtonGroup.innerHTML = `
                    <button class="btn edit" value="edit" onclick="handleModeButtonOnClick(event);">수정</button>
                    <button class="btn delete" value="delete" onclick="handleModeButtonOnClick(event);">삭제</button>
                `;
            } else {
                modeButtonGroup.innerHTML = `
                    <button class="btn" value="ok" onclick="handleModeButtonOnClick(event);">확인</button>
                    <button class="btn" value="cancel" onclick="handleModeButtonOnClick(event);">취소</button>
                `;
            }
        }
        
        function tableRender() {
            const isDisable = currentTableControlMode === tableControlMode.NONE;
            const checkboxAll = document.querySelector("#all");
            checkboxAll.disabled = isDisable || currentTableControlMode === tableControlMode.MODIFY;
            checkboxAll.checked = userList.filter(user => user.checked).length === userList.length && userList.length !== 0;
            const tbody = document.querySelector(".user-table > tbody");
            tbody.innerHTML = userList.map(user => `
                <tr>
                    <th><input type="checkbox" id=${user.id} ${user.checked ? "checked" : ""} ${isDisable ? "disabled" : ""} onchange="handleCheckBoxOnChange(event);"></th>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.password}</td>
                    <td><button onclick = "handleDeleteOnClick(${user.id})">삭제</button></td>
                </tr>
            `).join("");
        }
    </script>
    <!-- querySelectorAll가 리스트(배열)가 됨 -->
</body>
</html>
<!-- 타입/태그, 클래스같이 여러개를 가져와서 리스트에 담고 싶으면 querySelectorAll => Array => object여러개가 있음
 아이디같이 하나만 사용하면 querySelector만 사용 => Object
 함수가 동작을 하기 위해선 호출을 해야함. 
 여기서 함수는 (event) => {inputBox.classList.add("input-is-not-empty");} 
            (event) => {if (!event.target.value) inputBox.classList.remove("input-is-not-empty");}
            이 함수들은 event가 발생했을때 사용된다
onfocus(이벤트 함수 호출)과 onblur(이벤트 호출)는 비어있어서 대입을 한다.
반복(for)을 돌리면서 함수 정의를 해야한다
 -->
