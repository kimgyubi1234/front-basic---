<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            height: 100vh;
        }
            /* 디스플레이, 박스모델=> 마진 - 박스사이징 - 보더 - 너비 - 높이*/
            /* 플랙스 관련있으면 위에, 백그라운드는 아래에, 폰트사이즈 컬러는 밑에 */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: center;
            margin: 0 auto;
            width: 1200px;
            height: 100%;
            overflow: auto;
        }
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            padding: 20px;
        }
        .input-box {
            position: relative;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow : hidden;

            & > label{
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #444;
            }
            & > input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }

        .input-is-not-empty {
            & > label {
                font-size: 12px;
                top: 25%;
            }
            & > input {
                top: 30%;
                height: 80%;
            }
        }

        .register-button {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            boerder: 1px solid #ddbdbb;
            border-radius: 4px;
            width: 100%;
            height: 40px;
            background-color: #006caf;
            color: #fafafa;
            cursor: pointer;
        }

        &:hover {
            background-color: #005489;

        }

        &:after{
            background-color: #003e65;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="input-box input-is-not-empty">  <!-- 클래스 추가 -->
                <label for="un">사용자이름</label>
                <input type="text" id="un" name="username">
            </div>  
            <div class="input-box"> 
                <label for="pw">비밀번호</label>
                <input type="password" id="pw" name="password">
            </div>
            <button class="register-button">사용자 정보 등록</button>
        </div>
    </div>

    <!-- 이 밑은 이벤트 처리 코드다 on이 붙으면 전부 이벤트다
     onfocus (포커스를 얻었을 때) : 주요 용도: 입력창의 배경색 변경, 안내 문구 표시, 테두리 강조 등
        예시 : 돋보기를 가져다 대는 순간
     onblur (포커스를 잃었을 때) : 주요 용도: 입력값 유효성 검사(비밀번호가 너무 짧은지 체크 등), 원래 색상으로 복구
        예시 : 돋보기를 치우는 순간.
    -->
    <script>
        let userList = [];

        function autoIncrement () {
            let currentId = 0;

            return function() {
                currentId++;
                return currentId;
            }
        }

        const getNewId = autoIncrement();

        const inputBoxs = document.querySelectorAll(".input-box");

        for (let inputBox of inputBoxs) {
            const inputElemnet = inputBox.querySelector("input");

            inputElemnet.onfocus = (event) => {
                inputBox.classList.add("input-is-not-empty");
            }
            inputElemnet.onblur = (event) => {
                if (!event.target.value)
                inputBox.classList.remove("input-is-not-empty");
            }
        }

        const registerButton = document.querySelector(".register-button");
        registerButton.onclick = () => {
            const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));
            let newUser = {
                id: getNewId(),
            }
            Array.from(inputs).forEach(element => {
                const {name, value} = element;
                newUser = {
                    ...newUser,
                    [element.name]: element.value,
                }
            });
            userList = [
                ...userList,
                newUser,
            ];
            
            console.log(userList);
        }
    </script>
    <!-- querySelectorAll가 리스트(배열)가 됨 -->
</body>
</html>
<!-- 타입/태그, 클래스같이 여러개를 가져와서 리스트에 담고 싶으면 querySelectorAll => Array => object여러개가 있음
 아이디같이 하나만 사용하면 querySelector만 사용 => Object
 함수가 동작을 하기 위해선 호출을 해야함. 
 여기서 함수는 (event) => {inputBox.classList.add("input-is-not-empty");} 
            (event) => {if (!event.target.value) inputBox.classList.remove("input-is-not-empty");}
            이 함수들은 event가 발생했을때 사용된다
onfocus(이벤트 함수 호출)과 onblur(이벤트 호출)는 비어있어서 대입을 한다.
반복(for)을 돌리면서 함수 정의를 해야한다
 -->
