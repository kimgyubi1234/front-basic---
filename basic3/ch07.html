<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 1200px;
            height: 100%;
            overflow: auto;
        }
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            padding: 20px;
        }
        .input-box {
            position: relative;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow: hidden;

            & > label {
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                color: #444
            }

            & > input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }
        .register-button {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            width: 100%;
            height: 40px;
            background-color: #006caf;
            color: #fafafa;
            cursor: pointer;
        }
        
    </style>
</head>
<body>
    <!-- 1. input 2개 (username, password) -->
    <!-- button 1개 (등록하기) -->
     <div class="container">
        <div class="card">
            <div class="input-box">
                <input type="text" id="un" name="username">
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" name="pw" id="password">
                <label for="pw">비밀번호</label>
            </div>
            <div>
                <button class="register-button">사용자 정보 등록</button>
            </div>
        </div>
     </div>
</body>
</html>
